<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmerJohnny 功能测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e17;
            color: #c0c8d0;
            padding: 2rem;
            line-height: 1.6;
        }
        h1 {
            color: #8a7a3a;
            margin-bottom: 1rem;
            text-align: center;
        }
        h2 {
            color: #7a9a8a;
            margin: 1.5rem 0 1rem;
            border-bottom: 1px solid #2a3a4a;
            padding-bottom: 0.5rem;
        }
        .test-suite {
            background: #141a24;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .test-case {
            margin: 0.75rem 0;
            padding: 0.75rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .test-case.pass {
            background: rgba(76, 175, 80, 0.1);
            border-left: 4px solid #4caf50;
        }
        .test-case.fail {
            background: rgba(244, 67, 54, 0.1);
            border-left: 4px solid #f44336;
        }
        .test-icon {
            font-size: 1.2rem;
        }
        .test-name {
            flex: 1;
        }
        .summary {
            text-align: center;
            padding: 1.5rem;
            background: #141a24;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            margin-top: 2rem;
        }
        .summary h3 {
            color: #8a7a3a;
            margin-bottom: 1rem;
        }
        .pass-count {
            color: #4caf50;
            font-weight: bold;
        }
        .fail-count {
            color: #f44336;
            font-weight: bold;
        }
        .error-details {
            font-size: 0.85rem;
            color: #f44336;
            margin-top: 0.5rem;
            padding-left: 2rem;
        }
        .btn {
            background: #1a3a2a;
            color: #c0c8d0;
            border: 1px solid #2a3a4a;
            padding: 0.75rem 1.5rem;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: block;
            margin: 1rem auto;
        }
        .btn:hover {
            background: #2a4a5a;
            border-color: #8a7a3a;
        }
    </style>
</head>
<body>
    <h1>🌑 FarmerJohnny 功能测试</h1>
    
    <button class="btn" id="run-tests">运行所有测试</button>
    
    <div id="test-results"></div>
    
    <div class="summary" id="test-summary" style="display: none;">
        <h3>测试结果汇总</h3>
        <p>通过: <span class="pass-count">0</span> | 失败: <span class="fail-count">0</span></p>
    </div>

    <script src="../js/data/config/PlantConfig.js"></script>
    <script src="../js/data/config/FertilizerConfig.js"></script>
    <script src="../js/utils/EventBus.js"></script>
    <script src="../js/utils/Timer.js"></script>
    <script src="../js/utils/Logger.js"></script>
    <script src="../js/utils/Utils.js"></script>
    <script src="../js/data/modules/TimeModule.js"></script>
    <script src="../js/data/modules/EnvironmentModule.js"></script>
    <script src="../js/data/GameState.js"></script>
    <script src="../js/data/SaveManager.js"></script>
    <script src="../js/layers/business/core/FarmingModule.js"></script>
    <script src="../js/layers/business/core/EconomyModule.js"></script>
    <script src="../js/layers/control/EventBinder.js"></script>
    <script src="../js/layers/control/InputHandler.js"></script>
    <script src="../js/layers/control/InteractionManager.js"></script>
    <script src="../js/layers/presentation/AnimationManager.js"></script>
    <script src="../js/layers/presentation/EffectManager.js"></script>
    
    <script src="TestRunner.js"></script>
</body>
</html>
